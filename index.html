<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Check-In</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen justify-between font-sans">

    <div class="flex-grow flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
            
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="inline-block bg-orange-100 text-orange-600 p-4 rounded-full mb-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-gray-800 tracking-tight">Welcome!</h1>
                <p class="text-gray-500 mt-1">Please check in to secure your table</p>
            </div>

            <!-- Check-In Form -->
            <form id="checkInForm" class="space-y-5" onsubmit="handleCheckIn(event)">
                <!-- Restaurant Selection -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Select Restaurant Outlet</label>
                    <select id="restaurantLocation" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition bg-white font-medium text-gray-800">
                        <option value="Thai Mookata Tun Aminah">Thai Mookata Tun Aminah</option>
                        <option value="Thai Mookata Kulai">Thai Mookata Kulai</option>
                        <option value="Korean BBQ Restaurant">Korean BBQ Restaurant</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Full Name</label>
                    <input type="text" id="customerName" required placeholder="John Doe" 
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Phone Number</label>
                    <input type="tel" id="customerPhone" required placeholder="012-345 6789" 
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Number of Guests (Pax)</label>
                    <select id="guestCount" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition bg-white">
                        <option value="1">1 Person</option>
                        <option value="2" selected>2 People</option>
                        <option value="3">3 People</option>
                        <option value="4">4 People</option>
                        <option value="5">5 People</option>
                        <option value="6">6+ People</option>
                    </select>
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full bg-orange-500 text-white font-bold py-3 px-4 rounded-xl hover:bg-orange-600 transition shadow-lg shadow-orange-200 mt-6 flex justify-center items-center">
                    <span id="btnText">Check In Now</span>
                </button>
            </form>

            <!-- Success Message -->
            <div id="successMessage" class="hidden text-center py-6 space-y-3">
                <div class="inline-block bg-green-100 text-green-600 p-3 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">Check-In Successful!</h2>
                <p class="text-gray-600">Thank you, <span id="displayName" class="font-semibold text-orange-500"></span>. Please show this screen to our staff.</p>
                <button onclick="resetForm()" class="text-sm text-gray-400 underline hover:text-gray-600 mt-4 block mx-auto">
                    Check in another guest
                </button>
            </div>

        </div>
    </div>

    <footer class="text-center py-4 text-xs text-gray-400">
        &copy; 2026 Restaurant Management System. All rights reserved.
    </footer>

    <script>
        // https://script.google.com/macros/s/AKfycbzNxO9dXhWyRtuy1iYdxiO_08TEp8U8C5_YEzRTXr52kqjaNzqBpoOB-BkqeRqjV-E/exec
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzNxO9dXhWyRtuy1iYdxiO_08TEp8U8C5_YEzRTXr52kqjaNzqBpoOB-BkqeRqjV-E/exec";

        function handleCheckIn(event) {
            event.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            submitBtn.disabled = true;
            btnText.innerText = "Processing...";

            const restaurant = document.getElementById('restaurantLocation').value;
            const name = document.getElementById('customerName').value;
            const phone = document.getElementById('customerPhone').value;
            const pax = document.getElementById('guestCount').value;

            const customerData = {
                restaurant: restaurant,
                name: name,
                phone: phone,
                pax: pax
            };

            fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(customerData)
            })
            .then(() => {
                document.getElementById('checkInForm').classList.add('hidden');
                document.getElementById('successMessage').classList.remove('hidden');
                document.getElementById('displayName').innerText = name;
            })
            .catch(error => {
                console.error("Error logging check-in:", error);
                alert("Something went wrong. Please inform the restaurant staff.");
            })
            .finally(() => {
                submitBtn.disabled = false;
                btnText.innerText = "Check In Now";
            });
        }

        function resetForm() {
            document.getElementById('checkInForm').reset();
            document.getElementById('checkInForm').classList.remove('hidden');
            document.getElementById('successMessage').classList.add('hidden');
        }
    </script>
</body>
</html>
